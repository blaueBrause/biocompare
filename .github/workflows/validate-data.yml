name: Projektdaten validieren

on:
  push:
    paths:
      - 'data/**'
      - 'sources/**'
      - 'tools/validate_data.py'
      - 'tools/validate_competencies.py'
      - 'tools/validate_exam_rules.py'
      - 'tools/validate_ag_2022.py'
      - '.github/workflows/validate-data.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'sources/**'
      - 'tools/validate_data.py'
      - 'tools/validate_competencies.py'
      - 'tools/validate_exam_rules.py'
      - 'tools/validate_ag_2022.py'
      - '.github/workflows/validate-data.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Allgemeine Projektdaten validieren
        run: python tools/validate_data.py
      - name: Kompetenzbelege zellenweise validieren
        run: python tools/validate_competencies.py
      - name: Prüfungsvorgaben 2023–2027 validieren
        run: python tools/validate_exam_rules.py
      - name: Überarbeiteten AG-Bildungsplan 2022 validieren
        run: python tools/validate_ag_2022.py
